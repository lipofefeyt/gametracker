name: Daily Game Price Tracker

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Restore database cache
      uses: actions/cache@v4
      with:
        path: data/tracker.db
        key: tracker-db-${{ github.run_id }}
        restore-keys: |
          tracker-db-

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run Tracker
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
        RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
        STEAM_COUNTRY_CODE: ${{ secrets.STEAM_COUNTRY_CODE }}
      run: python main.py

    - name: Commit updated dashboard
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add docs/index.html
        git commit -m "chore: auto-update price dashboard" || echo "No changes to commit"
        git push
